  #   1. D1 database `mfj_ie_merch_orders` created and id pasted into
  #      worker/wrangler.merch.toml (currently blank).
  #   2. Secrets set on the Worker via `wrangler secret put --config wrangler.merch.toml`:
  #         STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET,
  #         MICROSOFT_GRAPH_CLIENT_ID, MICROSOFT_GRAPH_CLIENT_SECRET,
  #         POWER_AUTOMATE_WEBHOOK_URL, ADMIN_API_TOKEN.
  #   3. SharePoint list for .ie orders provisioned and id replaced in
  #      worker/wrangler.merch.toml MICROSOFT_GRAPH_LIST_ID.
